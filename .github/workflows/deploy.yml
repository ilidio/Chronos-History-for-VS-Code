name: Deploy VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Build Extension
        run: npm run compile

      - name: Package Extension
        id: package
        run: |
          # Packaging the extension into a specific file name for consistency
          npx @vscode/vsce package --out chronos-history.vsix
          echo "vsix_path=chronos-history.vsix" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: chronos-history.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/') && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronos-history-vsix
          path: chronos-history.vsix
